name: SFW Blue Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4 # Updated

      - name: Check out submodules
        uses: snickerbockers/submodules-init@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4 # Updated
        with:
          java-version: '8'
          distribution: 'zulu' # Reliable for older Forge/MCP builds

      - name: Make Gradlew Executable
        run: chmod +x gradlew

      - name: Gradle cache
        uses: actions/cache@v4 # Updated
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew --build-cache build

      - name: Archive SFW Blue Artifact
        uses: actions/upload-artifact@v4 # Updated
        with:
          name: SFW-Blue-Jar
          path: build/libs/*.jar
